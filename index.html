<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinomaxPH Download</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #020617;
    color: white;
    text-align: center;
    overflow: hidden;
}

#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.container {
    margin-top: 80px;
}

.logo {
    width: 180px;
    border-radius: 50%;
    box-shadow: 0 0 30px #00eaff;
}

.title {
    font-size: 28px;
    margin-top: 15px;
    color: #00eaff;
    font-weight: bold;
}

.btn {
    display: inline-block;
    padding: 14px 25px;
    margin: 10px;
    background: #00eaff;
    color: black;
    font-weight: bold;
    border-radius: 30px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    font-size: 16px;
}

.play {
    background: #111;
    color: white;
    border: 2px solid #00eaff;
}

/* Modal Background */
.overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 999;
    flex-direction: column;
}

/* Choices Box */
.choice-box {
    background: #111;
    padding: 30px;
    border-radius: 15px;
    border: 2px solid #00eaff;
    text-align: center;
}

.choice-box h3 {
    margin-top: 0;
    color: #00eaff;
}

.choice-btn {
    display: block;
    width: 200px;
    padding: 12px;
    margin: 10px auto;
    background: #222;
    color: white;
    border: 1px solid #00eaff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

.choice-btn:hover {
    background: #00eaff;
    color: black;
}

/* Video Container */
#videoContainer {
    width: 90%;
    max-width: 700px;
    background: #000;
    border: 2px solid #00eaff;
    border-radius: 10px;
    overflow: hidden;
}

video, iframe {
    width: 100%;
    height: 400px;
    display: block;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 35px;
    cursor: pointer;
    color: white;
    z-index: 1000;
}

.close:hover {
    color: #00eaff;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">
    <img src="https://i.ibb.co/zHFKDqzd/pinomax.png" class="logo">
    <div class="title">Download PinomaxPH</div>
    <br>

    <a href="https://rshrt.com/PinoMaxPh1_0_1" class="btn">Download App</a>

    <!-- Binago natin para buksan muna ang pamimilian -->
    <button class="btn play" onclick="openChoices()">▶ Watch Tutorial</button>
</div>

<!-- POPUP 1: Mamimili ang User -->
<div id="choicePopup" class="overlay">
    <div class="close" onclick="closeChoices()">✖</div>
    <div class="choice-box">
        <h3>Select Video Format</h3>
        <p style="font-size:14px; color:#ccc;">Choose a format if the video isn't playing.</p>
        <button class="choice-btn" onclick="playVideo('mp4')">▶ Play as MP4</button>
        <button class="choice-btn" onclick="playVideo('m3u8')">▶ Play as M3U8</button>
        <button class="choice-btn" onclick="playVideo('embed')">▶ Play as Embed</button>
    </div>
</div>

<!-- POPUP 2: Dito lalabas yung mismong Video -->
<div id="videoPopup" class="overlay">
    <div class="close" onclick="closeVideo()">✖</div>
    <!-- Dito ipapasok ng Javascript kung Iframe ba o Video tag -->
    <div id="videoContainer"></div>
</div>

<!-- Mga Scripts -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<!-- HLS.js para mapagana ang m3u8 sa lahat ng browser -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
// Particles Background
particlesJS("particles-js", {
    particles: {
        number: {value: 80},
        color: {value: "#00eaff"},
        shape: {type: "circle"},
        opacity: {value: 0.5},
        size: {value: 3},
        line_linked: {enable: true, color: "#00eaff"},
        move: {enable: true, speed: 2}
    }
});

// Function para ipakita ang Choices
function openChoices() {
    document.getElementById("choicePopup").style.display = "flex";
}

// Function para isara ang Choices
function closeChoices() {
    document.getElementById("choicePopup").style.display = "none";
}

// Function kapag nakapili na ang user
function playVideo(format) {
    closeChoices(); // Isara ang menu
    const container = document.getElementById("videoContainer");
    container.innerHTML = ""; // Linisin muna
    
    // Ilabas ang Video Popup
    document.getElementById("videoPopup").style.display = "flex";

    // Kung MP4 ang pinili
    if (format === 'mp4') {
        container.innerHTML = `
            <video id="myPlayer" controls autoplay>
                <source src="https://short.icu/zW9UezEsYN.mp4" type="video/mp4">
            </video>
        `;
    } 
    // Kung M3U8 ang pinili (Gagamitan ng HLS.js)
    else if (format === 'm3u8') {
        container.innerHTML = `<video id="myPlayer" controls autoplay></video>`;
        const video = document.getElementById('myPlayer');
        const videoSrc = "https://short.icu/zW9UezEsYN.m3u8";
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Para sa Safari at iOS devices
            video.src = videoSrc;
        }
    } 
    // Kung Embed (Iframe) ang pinili
    else if (format === 'embed') {
        container.innerHTML = `
            <iframe src="https://short.icu/zW9UezEsYN" frameborder="0" allowfullscreen></iframe>
        `;
    }
}

// Function para isara ang Video at ihinto ang sounds
function closeVideo() {
    document.getElementById("videoPopup").style.display = "none";
    document.getElementById("videoContainer").innerHTML = ""; // Binubura ang player para huminto ang sound
}
</script>

</body>
</html>
